repos:
  - repo: local
    hooks:
      - id: build-template
        name: Build template
        entry: just build-template
        language: system
        files: '\.typ$'
        pass_filenames: false
      - id: typstyle
        name: Format Typst source code
        language: system
        entry: just format
        files: .*\.typ
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-yaml
